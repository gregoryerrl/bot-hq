# Default project rules template — strictest fallback.
#
# This file is NOT auto-applied. The loader hard-fails (ErrNoRulesFound)
# when ~/.bot-hq/projects/<name>.yaml is missing for a given project.
# Bootstrap workflow:
#   1. Brian attempts hub_spawn into unknown project; blocked.
#   2. Rain inspects `git -C <project> branch -r` to identify branch convention.
#   3. Rain proposes a rules file based on this template.
#   4. User confirms via hub_flag; Rain saves to ~/.bot-hq/projects/<name>.yaml.
#
# Copy this file as a starting point; fill in remote_url + project_name + branch_pattern.

# REMOTE_URL IS REQUIRED FOR MISMATCH PROTECTION — never omit. The loader
# only enforces ErrRemoteMismatch when remote_url is non-empty; an empty
# remote_url silently skips the safety check and lets a wrong-project rules
# file load successfully. Always populate this field.
remote_url: ""              # MUST set: must match `git remote get-url origin` exactly
project_name: ""            # MUST set: canonical name (typically the repo name)

# Branch creation rules — empty pattern disables enforcement (NOT recommended for non-bot-hq projects).
branch_pattern: ""
branch_examples: []
branch_pattern_help: ""

# Push approval (H-3c) — default true for non-bot-hq.
push_requires_approval: true

# Force-push (H-13) — hard-block; user token-greenlights via verbatim reply.
force_push_blocked: true
force_push_token_format: "force-push-greenlight: {branch}@{sha}"

# Coder tool allowlist (H-16) — strict default for unknown projects.
coder_tools_blocked:
  - "git push"
  - "git push --force"
  - "gh pr create"
  - "gh pr merge"
  - "gh issue close"
  - "rm -rf"
coder_tools_per_action_approval: []

# Optional metadata (informational only in v1).
commit_style: "imperative-mood"
require_issue_link: false
