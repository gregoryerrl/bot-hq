# bot-hq self-rules — lenient (bot-hq is its own project, push freely).
#
# Copy to ~/.bot-hq/projects/bot-hq.yaml after slice 1 ships, so hub_spawn
# into the bot-hq directory itself does not get blocked by H-14.

remote_url: "git@github.com:gregoryerrl/bot-hq.git"
project_name: "bot-hq"

# Lenient branch pattern: brian/*, rain/*, coder-<hex>/* worktree branches.
branch_pattern: "^(brian|rain|coder-[a-f0-9]+)/[a-z0-9.-]+$"
branch_examples:
  - "brian/phase-h-slice-1"
  - "rain/fix-discord-io"
  - "coder-13ea3a3b/worktree-task"
branch_pattern_help: "brian/<topic>, rain/<topic>, or coder-<hex>/<topic>"

# bot-hq self-pushes freely (no approval gate).
push_requires_approval: false

# Force-push allowed for bot-hq (used during phase rebases).
force_push_blocked: false
force_push_token_format: ""

# Coders working in bot-hq dir get full shell access (we trust ourselves here).
coder_tools_blocked: []
coder_tools_per_action_approval: []

commit_style: "imperative-mood"
require_issue_link: false
