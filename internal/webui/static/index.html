<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bot-hq workspace</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <h1>bot-hq workspace</h1>
    <span class="agent-state" id="agent-state" title="Live agent state — Phase N v3.x-2 fills">trio: idle</span>
    <span class="spacer"></span>
    <label class="picker">
      Project
      <select id="project-picker"></select>
    </label>
    <span class="active-project-chip" id="active-project-chip">bot-hq</span>
    <input type="search" id="nav-search" class="nav-search" placeholder="Search files…" autocomplete="off" />
  </header>

  <main>
    <aside class="sidebar">
      <section class="nav-section" id="nav-global">
        <h2>Global</h2>
        <div class="nav-list" id="nav-global-list"><em>Loading…</em></div>
      </section>
      <section class="nav-section" id="nav-project">
        <h2>Projects</h2>
        <div class="nav-list" id="nav-project-list"><em>Loading…</em></div>
      </section>
    </aside>

    <section class="doc">
      <header class="doc-header">
        <span id="doc-path">Pick a destination on the left.</span>
        <span id="doc-mtime" class="muted"></span>
        <span class="spacer"></span>
        <span id="doc-dirty" class="dirty-indicator hidden">● Unsaved</span>
        <button id="doc-mode" type="button" title="Toggle rendered/raw view">View: rendered</button>
        <button id="doc-save" type="button" disabled>Save</button>
      </header>
      <div id="doc-rendered" class="doc-rendered"></div>
      <textarea id="doc-content" spellcheck="false" placeholder="Pick a file from a destination to edit." class="hidden"></textarea>
      <div id="doc-status" class="muted"></div>
    </section>
  </main>

  <!-- Conflict modal: surfaces when a 409 is returned (mtime mismatch). -->
  <div id="conflict-modal" class="modal hidden">
    <div class="modal-card">
      <h3>File changed since last load</h3>
      <p>The file on disk has been modified externally. Choose how to proceed:</p>
      <div class="conflict-actions">
        <button id="conflict-overwrite" type="button">Overwrite</button>
        <button id="conflict-discard" type="button">Discard local edits</button>
        <button id="conflict-keep" type="button">Keep editing (no save)</button>
      </div>
      <details>
        <summary>Show server's current content</summary>
        <pre id="conflict-server-content"></pre>
      </details>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
